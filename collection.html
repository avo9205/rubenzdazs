    <!-- SCRIPT DE LÓGICA "CARGAR MÁS" Y CAMBIO DE VISTA -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* --- LÓGICA DE CARGAR MÁS --- */
            const loadMoreBtn = document.getElementById('load-more-btn');
            const loadMoreContainer = document.getElementById('load-more-container');
            const grid = document.getElementById('contenedor-productos');
            
            const itemsPerLoad = 4; // Cuántas muestra inicialmente y por cada clic
            let currentLimit = itemsPerLoad;

            function updateVisibility() {
                const allCards = grid.querySelectorAll('.product-card');
                if (allCards.length === 0) return;

                // Forzamos a ocultar o mostrar según el límite actual
                allCards.forEach((card, index) => {
                    if (index < currentLimit) {
                        card.classList.remove('hidden');
                        card.style.display = ''; // Limpiamos estilos en línea por si acaso
                    } else {
                        card.classList.add('hidden');
                        card.style.display = 'none'; // Forzamos ocultar
                    }
                });

                // Si hay tarjetas ocultas, mostramos el botón
                if (allCards.length > currentLimit) {
                    loadMoreContainer.style.display = 'flex';
                } else {
                    loadMoreContainer.style.display = 'none';
                }
            }

            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', () => {
                    currentLimit += itemsPerLoad; // Aumentamos el límite
                    updateVisibility();
                });
            }

            // El observador detecta cuando card_ropa.js inserta los productos 
            // y fuerza la visibilidad automáticamente
            if (grid) {
                const observer = new MutationObserver(() => {
                    updateVisibility();
                });
                observer.observe(grid, { childList: true });
            }

            /* --- LÓGICA DE CAMBIO DE VISTA (1 a varias) --- */
            const viewToggleBtn = document.getElementById('view-toggle-btn');
            if(viewToggleBtn) {
                viewToggleBtn.addEventListener('click', () => {
                    grid.classList.toggle('single-view');
                    if(grid.classList.contains('single-view')) {
                        viewToggleBtn.innerText = "Ver Varias ⊞";
                    } else {
                        viewToggleBtn.innerText = "Ver Una ⊟";
                    }
                });
            }
        });
    </script>
