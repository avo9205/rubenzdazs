<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<style>
	
	/*resetear o formateamos todo el tamaño de las cajas*/
	*{
		background-origin: border-box;
		margin: 0;
		padding: 0;
	}

	/*el tamaño de toda la pantalla*/
	body {
		font-family: "poppins", sans-serif;
		font-size: 1.2rem;
		min-height: 100vh;
		padding: 20px;
	}


	/*contenedor donde estara todos lo bloques de nuestra pagina web*/
	/*el mayus afecta a todos lo hijos*/
	.grid-container > * {

		box-shadow: 10px 6px 37px -13px	rgb(51, 51, 51 , 0.74);
		background-origin: 10px;
		padding: 10px;
		text-align: center;
		font-weight: 500;
	}

	



	/*maquetar la pagina web-mobile */
	.grid-container{
		
		display: grid;
		gap: 20px;
		/*definimos el orden de los bloques*/
		grid-template:
		"header" 	200px
		"navbar" 	50px
		"sidebar" 	100px
		"article" 
		"footer";

		/*breakpont mobile*/
		.header{
			grid-area: header;
			background-color: red;	 
		}
		.navbar{
			grid-area: navbar;
			background-color: blue;	 
		}
		.sidebar{
			grid-area: sidebar;
			background-color: orange;	 
		}
		.article{
			grid-area: article;
			background-color: yellow;	 
		}
		.footer{
			grid-area: footer;
			background-color: green;	 
		}

		
		
	
		/*breakpoint tablet */
	@media (min-width: 768px )	{
		grid-template:
		"header navbar" 	50px	
		"header navbar" 	50px	
		"sidebar article" 	auto
		"footer footer"		100px/200px auto;
	}


		/*berckpoint pagina-web */
	@media (min-width: 992px )	{
		/*tiener 3 columnas*/
		grid-template:
		"header header header"		100px
		"navbar article sidebar"	auto	 		
		"footer footer footer"		100px/200px auto 200px ;
	}
	
	



	}
</style>







<body class="grid-container">

<header class="header">HEADER </header>
<nav class="navbar">NAVBAR</nav>
<aside class="sidebar">SIDEBAR</aside>
<article class="article">ARTICLE</article>
<footer class="footer">FOOTER</footer>

</body>
</html>
